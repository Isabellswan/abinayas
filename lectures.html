<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Lectures & Scientific Talks</title>

<style>

/* BASIC */

body{
margin:0;
font-family:'Inter', sans-serif;
color:white;
}

/* PAGE CONTENT */

.page{
position:relative;
z-index:2;
padding:80px 20px;
max-width:900px;
margin:auto;
text-align:center;
}

h1{
font-family:'Orbitron';
font-size:42px;
margin-bottom:40px;
}

.lecture{
background:rgba(0,0,0,0.65);
padding:25px;
margin:20px auto;
border-radius:12px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 20px rgba(0,0,0,0.6);
backdrop-filter:blur(4px);
text-align:left;
}

.lecture h3{
margin:0 0 10px 0;
font-size:20px;
}

.lecture p{
margin:4px 0;
color:#ddd;
}

a.back{
display:inline-block;
margin-top:40px;
color:#58a6ff;
text-decoration:none;
}

a.back:hover{
color:white;
}


/* STARFIELD BACKGROUND */

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:-1;
overflow:hidden;
}

.stars::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:
radial-gradient(2px 2px at 20px 30px, white, transparent),
radial-gradient(1.5px 1.5px at 50px 80px, white, transparent),
radial-gradient(2px 2px at 120px 60px, white, transparent),
radial-gradient(1.5px 1.5px at 200px 150px, white, transparent),
radial-gradient(2px 2px at 300px 200px, white, transparent);
background-repeat:repeat;
background-size:600px 600px;
animation:starDrift 150s linear infinite;
}

.stars::after{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(2px 2px white, transparent);
background-size:300px 300px;
animation:twinkle 4s infinite alternate;
opacity:0.6;
}

@keyframes twinkle{
from{opacity:0.4;}
to{opacity:1;}
}

@keyframes starDrift{
from{transform:translateY(0);}
to{transform:translateY(-800px);}
}

/* NEBULA */

.nebula{
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
z-index:-2;

background:
radial-gradient(circle at 20% 30%, rgba(120,0,255,0.35), transparent 60%),
radial-gradient(circle at 70% 50%, rgba(0,150,255,0.35), transparent 60%),
radial-gradient(circle at 40% 80%, rgba(255,0,200,0.30), transparent 60%);

filter:blur(80px);
animation:nebulaMove 300s linear infinite;
}

@keyframes nebulaMove{
from{transform:translateX(0);}
to{transform:translateX(-400px);}
}

/* SHOOTING STARS */

.shooting-star{
position:fixed;
top:-100px;
left:10%;
width:120px;
height:2px;
background:linear-gradient(to right, transparent, white);
opacity:0.9;
transform:rotate(45deg);
animation:shoot 6s linear infinite;
}

.shooting-star:nth-child(2){
left:40%;
animation-delay:2s;
}

.shooting-star:nth-child(3){
left:70%;
animation-delay:4s;
}

@keyframes shoot{
0%{
transform:translate(0,0) rotate(45deg);
opacity:1;
}
100%{
transform:translate(1200px,600px) rotate(45deg);
opacity:0;
}

}

</style>
</head>

<body>

<div class="stars"></div>
<div class="nebula"></div>

<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

</html>
